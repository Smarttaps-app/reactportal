name: Build & Deploy React Portal to DigitalOcean

# Builds the portal in CI (off-server, so the 3.8 GB droplet never OOMs),
# then ships only the built dist/ to /var/www/portal_biz/ on the server.

on:
  push:
    branches: [main]
  workflow_dispatch: {} # allow manual "Run workflow" from the GitHub UI

concurrency:
  group: deploy-portal
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Public API URLs baked into the bundle at build time. The repo's
          # .env files are gitignored, so CI must supply these or the portal
          # ends up with an empty base URL and fetches no data.
          VITE_API_BASE_URL: https://api.smarttaps.biz/api/v1/
          VITE_API_IBASE_URL: https://api.smarttaps.biz/api/v1/static/images/
          VITE_APP_TITLE: "SMART TAP | Providing seamless access to payment"

      - name: Deploy dist/ to server over SSH
        run: |
          set -e
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.DEPLOY_PORT }}" "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          SSH="ssh -p ${{ secrets.DEPLOY_PORT }} -i ~/.ssh/id_ed25519"
          echo ">> Syncing dist/ to /var/www/portal_biz/ ..."
          rsync -avz --delete -e "$SSH" dist/ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/var/www/portal_biz/"
          echo ">> Fixing permissions ..."
          $SSH "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "chown -R www-data:www-data /var/www/portal_biz && find /var/www/portal_biz -type d -exec chmod 755 {} \; && find /var/www/portal_biz -type f -exec chmod 644 {} \;"
          echo ">> Deploy complete."
